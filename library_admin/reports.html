<!DOCTYPE html>
<html>
<head>
<title>Reports</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">

<h2>Library Admin</h2>

<ul>
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="manage_books.html">Manage Books</a></li>
<li><a href="manage_users.html">Manage Users</a></li>
<li><a href="borrowing_history.html">Borrowing History</a></li>
<li><a class="active" href="reports.html">Reports</a></li>
<li><a href="settings.html">Settings</a></li>
<li><a href="logout.html">Logout</a></li>
</ul>

</div>

<div class="main">

<h1>Reports</h1>

<div class="card">
<h3>Total Books</h3>
<p id="reportTotalBooks">0</p>
</div>

<div class="card">
<h3>Total Users</h3>
<p id="reportTotalUsers">0</p>
</div>

<div class="card">
<h3>Most Borrowed Book</h3>
<p id="reportTopBook">N/A</p>
</div>

</div>

</body>

<script src="../frontend/auth.js"></script>
<script src="../frontend/auth-guard.js"></script>
<script>
const API_BASE = 'http://localhost:3000/api';

Promise.all([
	fetch(`${API_BASE}/`, { headers: AuthUtil.getAuthHeader() }).then((r) => r.json()),
	fetch(`${API_BASE}/accounts`, { headers: AuthUtil.getAuthHeader() }).then((r) => r.json()),
	fetch(`${API_BASE}/log/borrow`, { headers: AuthUtil.getAuthHeader() }).then((r) => r.json())
]).then(([resourcesRes, usersRes, borrowsRes]) => {
	const resources = resourcesRes.data || [];
	const users = usersRes.data || [];
	const borrows = borrowsRes.data || [];

	document.getElementById('reportTotalBooks').textContent = resources.length;
	document.getElementById('reportTotalUsers').textContent = users.length;

	const counter = {};
	borrows.forEach((item) => {
		const key = item.title || 'Unknown';
		counter[key] = (counter[key] || 0) + 1;
	});

	const topBook = Object.entries(counter).sort((a, b) => b[1] - a[1])[0];
	document.getElementById('reportTopBook').textContent = topBook ? `${topBook[0]} (${topBook[1]})` : 'N/A';
}).catch((error) => {
	console.error('Failed to load report data:', error);
});
</script>
</html>
