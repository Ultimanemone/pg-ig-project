<!DOCTYPE html>
<html>
<head>
<title>Manage Users</title>
<link rel="stylesheet" href="style.css">

<style>

.table table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
background:white;
}

.table th,
.table td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

.table th{
background:#eee;
}

/* column widths */

.table th:nth-child(1),
.table td:nth-child(1){
width:8%;
}

.table th:nth-child(2),
.table td:nth-child(2){
width:20%;
}

.table th:nth-child(3),
.table td:nth-child(3){
width:30%;
}

.table th:nth-child(4),
.table td:nth-child(4){
width:12%;
}

.table th:nth-child(5),
.table td:nth-child(5){
width:10%;
}

.table th:nth-child(6),
.table td:nth-child(6){
width:20%;
text-align:center;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Library Admin</h2>

<ul>
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="manage_books.html">Manage Books</a></li>
<li><a class="active" href="manage_users.html">Manage Users</a></li>
<li><a href="borrowing_history.html">Borrowing History</a></li>
<li><a href="reports.html">Reports</a></li>
<li><a href="settings.html">Settings</a></li>
<li><a href="logout.html">Logout</a></li>
</ul>

</div>

<div class="main">

<h1>Manage Users</h1>

<button id="addUserBtn">Add User</button>
<!-- User Modal -->
<div id="userModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:1000; align-items:center; justify-content:center;">
  <div style="background:white; border-radius:10px; padding:32px; width:420px; box-shadow:0 8px 32px rgba(0,0,0,0.2);">
    <h2 id="userModalTitle" style="margin-top:0;">Add User</h2>
    <input type="hidden" id="editUserId" />

    <label>Name</label><br/>
    <input id="editNickname" type="text" style="width:100%; margin-bottom:12px; padding:8px; box-sizing:border-box;" /><br/>

    <label>Email</label><br/>
    <input id="editEmail" type="email" style="width:100%; margin-bottom:12px; padding:8px; box-sizing:border-box;" /><br/>

    <label>Password</label><br/>
    <input id="editPassword" type="password" style="width:100%; margin-bottom:12px; padding:8px; box-sizing:border-box;" /><br/>

    <label>Role</label><br/>
    <select id="editRole" style="width:100%; margin-bottom:20px; padding:8px; box-sizing:border-box;">
      <option value="User">User</option>
      <option value="Admin">Admin</option>
    </select><br/>

    <div style="display:flex; gap:10px; justify-content:flex-end;">
      <button id="userModalDiscardBtn" style="padding:10px 20px; background:#e9edf2; border:none; border-radius:8px; cursor:pointer; font-weight:600;">Discard</button>
      <button id="userModalSaveBtn" style="padding:10px 20px; background:#1f2d3d; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:600;">Save</button>
    </div>
  </div>
</div>
<div class="table">

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Role</th>
<th>Status</th>
<th>Action</th>
</tr>

<tbody id="usersTableBody"></tbody>

</table>

</div>

</div>

</body>

<script src="../frontend/auth.js"></script>
<script src="../frontend/auth-guard.js"></script>
<script>
const API_BASE = 'http://localhost:3000/api';
	//Toast thông báo
    function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.style.cssText = `
      position: fixed; bottom: 24px; right: 24px; padding: 14px 28px;
      border-radius: 8px; color: white; font-weight: 600; z-index: 10000;
      background: ${type === 'success' ? '#28a745' : '#dc3545'};
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      transition: opacity 0.4s;
    `;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 500);
    }, 3200);
  }

const usersBody = document.getElementById('usersTableBody');
const addUserBtn = document.getElementById('addUserBtn');

const statusFromRole = (role) => role ? 'Active' : 'Inactive';

const request = (path, options = {}) => {
	const headers = options.body
		? AuthUtil.getAuthHeader()
		: { Authorization: AuthUtil.getAuthHeader().Authorization };

	return fetch(`${API_BASE}${path}`, {
		...options,
		headers
	}).then((res) => res.json());
};

const renderRow = (user) => {
	const tr = document.createElement('tr');
	tr.innerHTML = `
		<td>${user.user_id}</td>
		<td>${user.nickname || ''}</td>
		<td>${user.email || ''}</td>
		<td>${user.role || ''}</td>
		<td>${statusFromRole(user.role)}</td>
		<td>
			<button data-edit-id="${user.user_id}">Edit</button>
			<button data-delete-id="${user.user_id}">Delete</button>
		</td>
	`;
	return tr;
};

const loadUsers = () => {
	request('/accounts')
		.then((payload) => {
			const users = payload.data || [];
			usersBody.innerHTML = '';
			users.forEach((user) => usersBody.appendChild(renderRow(user)));
			if (!users.length) {
				usersBody.innerHTML = '<tr><td colspan="6">No users found.</td></tr>';
			}
		})
		.catch((error) => {
			console.error('Failed to load users:', error);
			usersBody.innerHTML = '<tr><td colspan="6">Failed to load users.</td></tr>';
		});
};

const openAddUserModal = () => {
  document.getElementById('userModalTitle').textContent = 'Add User';
  document.getElementById('editUserId').value = '';
  document.getElementById('editNickname').value = '';
  document.getElementById('editEmail').value = '';
  document.getElementById('editPassword').value = '';
  document.getElementById('editRole').value = 'User';
  document.getElementById('userModalSaveBtn').textContent = 'Add User';

  document.getElementById('userModal').style.display = 'flex';
};

const openEditUserModal = async (id) => {
  const details = await request(`/accounts?user_id=${encodeURIComponent(id)}`);
  if (!details.success || !details.user) {
    showToast('Failed to load user details', 'error');
    return;
  }

  const current = details.user;
  document.getElementById('userModalTitle').textContent = 'Edit User';
  document.getElementById('editUserId').value = id;
  document.getElementById('editNickname').value = current.nickname || '';
  document.getElementById('editEmail').value = current.email || '';
  document.getElementById('editPassword').value = '';
  document.getElementById('editRole').value = current.role || 'User';
  document.getElementById('userModalSaveBtn').textContent = 'Save Changes';

  document.getElementById('userModal').style.display = 'flex';
};

const handleUserModalSave = async () => {
  const id = document.getElementById('editUserId').value;
  const nickname = document.getElementById('editNickname').value.trim();
  const email = document.getElementById('editEmail').value.trim();
  const password = document.getElementById('editPassword').value.trim();
  const role = document.getElementById('editRole').value;

  if (!nickname || !email || !password) {
    showToast('Name, Email and Password are required', 'error');
    return;
  }

  // Không có id → đang Add
  if (!id) {
    const created = await request('/accounts', {
      method: 'POST',
      body: JSON.stringify({ nickname, email, password, role })
    });

    if (!created.success) {
      showToast('Failed to create user', 'error');
      return;
    }

    document.getElementById('userModal').style.display = 'none';
    showToast('User created successfully', 'success');
    loadUsers();
    return;
  }

  // Có id → đang Edit
  const updated = await request('/accounts', {
    method: 'PUT',
    body: JSON.stringify({ user_id: Number(id), nickname, email, password, role })
  });

  if (!updated.success) {
    showToast(updated.message || 'Failed to update user', 'error');
    return;
  }

  document.getElementById('userModal').style.display = 'none';
  showToast('User updated successfully', 'success');
  loadUsers();
};

const deleteUser = async (id) => {
	if (!confirm(`Delete user #${id}?`)) return;

	const deleted = await request('/accounts', {
		method: 'DELETE',
		body: JSON.stringify({ user_id: Number(id) })
	});

	if (!deleted.success) {
		//alert(deleted.message || 'Failed to delete user');
		showToast('Failed to delete user', 'error');
		return;
	}

	loadUsers();
};

addUserBtn.addEventListener('click', openAddUserModal);
document.getElementById('userModalSaveBtn').addEventListener('click', handleUserModalSave);
document.getElementById('userModalDiscardBtn').addEventListener('click', () => {
  document.getElementById('userModal').style.display = 'none';
});

usersBody.addEventListener('click', (event) => {
	const editId = event.target.getAttribute('data-edit-id');
	const deleteId = event.target.getAttribute('data-delete-id');
	if (editId) openEditUserModal(editId);
	if (deleteId) deleteUser(deleteId);
});

loadUsers();
</script>
</html>
