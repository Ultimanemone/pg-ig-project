<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2 class="logo">Library User</h2>

      <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="search_books.html">Search Books</a></li>
        <li><a href="borrowing_history.html">My Borrowed Books</a></li>
        <!-- <li><a href="borrowing_history.html">Borrowing History</a></li> -->
        <li><a class="active" href="profile.html">Profile</a></li>
        <li><a href="settings.html">Settings</a></li>
        <li><a href="logout.html">Logout</a></li>
      </ul>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <div class="page-header">
        <h1>Profile</h1>
        <p>User</p>
      </div>

      <div class="profile-layout">
        <!-- PROFILE INFO -->
        <section class="profile-card">
          <h2>Profile Information</h2>

          <div class="profile-info-list">
            <div class="profile-info-item">
              <span>Full Name</span>
              <p id="profileFullName">-</p>
            </div>

            <div class="profile-info-item">
              <span>Email</span>
              <p id="profileEmail">-</p>
            </div>

            <div class="profile-info-item">
              <span>Phone</span>
              <p>-</p>
            </div>

            <div class="profile-info-item">
              <span>Student ID</span>
              <p id="profileUserId">-</p>
            </div>

            <div class="profile-info-item">
              <span>Department</span>
              <p>-</p>
            </div>

            <div class="profile-info-item">
              <span>Membership Type</span>
              <p id="profileRole">-</p>
            </div>
          </div>
        </section>

      </div>
    </main>
  </div>

  <script src="../frontend/auth.js"></script>
  <script src="../frontend/auth-guard.js"></script>
  <script>
    const API_BASE = 'http://localhost:3000/api';
    const userId = AuthUtil.getUserId();
    const username = AuthUtil.getUsername();

    const setFallback = () => {
      document.getElementById('profileFullName').textContent = username || '-';
      document.getElementById('profileEmail').textContent = '-';
      document.getElementById('profileUserId').textContent = userId || '-';
      document.getElementById('profileRole').textContent = AuthUtil.getRole() || '-';
    };

    if (!userId && !username) {
      setFallback();
    } else {
      const query = userId ? `user_id=${encodeURIComponent(userId)}` : `username=${encodeURIComponent(username)}`;
      fetch(`${API_BASE}/accounts?${query}`, { headers: AuthUtil.getAuthHeader() })
        .then((res) => res.json())
        .then((payload) => {
          const user = payload.user;
          if (!user) {
            setFallback();
            return;
          }
          document.getElementById('profileFullName').textContent = user.nickname || '-';
          document.getElementById('profileEmail').textContent = user.email || '-';
          document.getElementById('profileUserId').textContent = user.user_id || '-';
          document.getElementById('profileRole').textContent = user.role || '-';
        })
        .catch((error) => {
          console.error('Failed to load profile:', error);
          setFallback();
        });
    }
  </script>
</body>
</html>
