<body>
  <div class="dashboard-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2 class="logo">Library User</h2>


      <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="search_books.html">Search Books</a></li>
        <li><a class="active" href="borrowing_history.html">My Borrowed Books</a></li>
        <!-- <li><a href="borrowing_history.html">Borrowing History</a></li> -->
        <li><a href="profile.html">Profile</a></li>
        <li><a href="settings.html">Settings</a></li>
        <li><a href="logout.html">Logout</a></li>
      </ul>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <div class="page-header">
        <h1>Borrowing History</h1>
        <p>User</p>
      </div>

      <section class="table-wrapper">
        <table class="history-table">
          <thead>
            <tr>
              <th>Book Title</th>
              <th>Date Borrowed</th>
              <th>Due Date</th>
              <th>Return Date</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="userBorrowHistoryBody"></tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="../frontend/auth.js"></script>
  <script src="../frontend/auth-guard.js"></script>
  <script>
    const API_BASE = 'http://localhost:3000/api';
    const userId = AuthUtil.getUserId();
    const body = document.getElementById('userBorrowHistoryBody');

    const formatDate = (value) => {
      if (!value) return '-';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return '-';
      return d.toLocaleDateString('en-GB');
    };

    const loadBorrowHistory = () => fetch(`${API_BASE}/log/borrow?user_id=${encodeURIComponent(userId || '')}`, { headers: AuthUtil.getAuthHeader() })
      .then((res) => res.json())
      .then((payload) => {
        const rows = payload.data || [];
        body.innerHTML = '';
        rows.forEach((row) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${row.title || ''}</td>
            <td>${formatDate(row.borrow_date)}</td>
            <td>${formatDate(row.return_date)}</td>
            <td>${row.status === 'Returned' ? formatDate(row.return_date) : '-'}</td>
            <td>${row.status || ''}</td>
            <td>${row.status === 'Borrowed' ? `<button data-open-id="${row.res_id}">Open</button> <button data-return-id="${row.res_id}">Return</button>` : '-'}</td>
          `;
          body.appendChild(tr);
        });
        if (!rows.length) {
          body.innerHTML = '<tr><td colspan="6">No borrowing history found.</td></tr>';
        }
      })
      .catch((error) => {
        console.error('Failed to load borrowing history:', error);
        body.innerHTML = '<tr><td colspan="6">Failed to load borrowing history.</td></tr>';
      });

    const returnBook = (resId) => {
      if (!userId) {
        alert('Missing user session. Please login again.');
        return;
      }

      fetch(`${API_BASE}/return`, {
        method: 'POST',
        headers: AuthUtil.getAuthHeader(),
        body: JSON.stringify({ user_id: Number(userId), res_id: Number(resId) })
      })
        .then((res) => res.json())
        .then((payload) => {
          if (!payload.success) {
            alert(payload.error || payload.message || 'Failed to return book');
            return;
          }
          alert('Book returned successfully');
          loadBorrowHistory();
        })
        .catch((error) => {
          console.error('Return request failed:', error);
          alert('Return request failed');
        });
    };

    body.addEventListener('click', (event) => {
      const openId = event.target.getAttribute('data-open-id');
      if (openId) {
        window.location.href = `reading_page.html?res_id=${encodeURIComponent(openId)}`;
        return;
      }

      const resId = event.target.getAttribute('data-return-id');
      if (resId) {
        returnBook(resId);
      }
    });

    loadBorrowHistory();
  </script>
</body>
</html>
