<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library User Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2 class="logo">Library User</h2>

      <!-- <nav class="sidebar-nav">
        <a href="#" class="active">Dashboard</a>
        <a href="#">Search Books</a>
        <a href="#">My Borrowed Books</a>
        <a href="#">Borrow History</a>
        <a href="#">Profile</a>
        <a href="#">Settings</a>
        <a href="#">Logout</a>
      </nav> -->

      <ul>
        <li><a class="active" href="dashboard.html">Dashboard</a></li>
        <li><a href="search_books.html">Search Books</a></li>
        <li><a href="borrowing_history.html">My Borrowed Books</a></li>
        <!-- <li><a href="borrowing_history.html">Borrowing History</a></li> -->
        <li><a href="profile.html">Profile</a></li>
        <li><a href="settings.html">Settings</a></li>
        <li><a href="logout.html">Logout</a></li>
      </ul>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <div class="page-header">
        <h1>Dashboard</h1>
        <p data-auth-user>User</p>
      </div>

      <section class="card-list">
        <div class="card">
          <h3>Borrowed Books</h3>
          <p id="userBorrowedBooks">0</p>
        </div>

        <div class="card">
          <h3>Books Due Soon</h3>
          <p id="userDueSoon">0</p>
        </div>

        <div class="card">
          <h3>Returned Books</h3>
          <p id="userReturnedBooks">0</p>
        </div>

        <div class="card">
          <h3>Available Resources</h3>
          <p id="userAvailableResources">0</p>
        </div>
      </section>
    </main>
  </div>

  <script src="../frontend/auth.js"></script>
  <script src="../frontend/auth-guard.js"></script>
  <script>
    const API_BASE = 'http://localhost:3000/api';
    const username = AuthUtil.getUsername();

    Promise.all([
      fetch(`${API_BASE}/log/borrow`, { headers: AuthUtil.getAuthHeader() }).then((r) => r.json()),
      fetch(`${API_BASE}/`, { headers: AuthUtil.getAuthHeader() }).then((r) => r.json())
    ]).then(([borrowRes, resourcesRes]) => {
      const borrows = (borrowRes.data || []).filter((row) => row.nickname === username || row.email === username);
      const resources = resourcesRes.data || [];

      const now = new Date();
      const in7Days = new Date();
      in7Days.setDate(now.getDate() + 7);

      const dueSoon = borrows.filter((row) => {
        if (!row.return_date || row.status !== 'Borrowed') return false;
        const d = new Date(row.return_date);
        return !Number.isNaN(d.getTime()) && d >= now && d <= in7Days;
      }).length;

      document.getElementById('userBorrowedBooks').textContent = borrows.filter((row) => row.status === 'Borrowed').length;
      document.getElementById('userDueSoon').textContent = dueSoon;
      document.getElementById('userReturnedBooks').textContent = borrows.filter((row) => row.status === 'Returned').length;
      document.getElementById('userAvailableResources').textContent = resources.filter((row) => row.availability === 'Available').length;
    }).catch((error) => {
      console.error('Failed to load dashboard data:', error);
    });
  </script>
</body>
</html>
