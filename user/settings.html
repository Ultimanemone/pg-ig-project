  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2 class="logo">Library User</h2>

      <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="search_books.html">Search Books</a></li>
        <li><a href="borrowing_history.html">My Borrowed Books</a></li>

        <li><a class="active" href="settings.html">Settings</a></li>
        <li><a href="logout.html">Logout</a></li>
      </ul>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <div class="page-header">
        <h1>Profile</h1>
        <p>User</p>
      </div>

      <div class="profile-layout">

        <!-- EDIT FORM -->
        <section class="profile-card">
          <h2>Edit Profile</h2>

          <form class="profile-form">
            <div class="form-group">
              <label for="fullName">Full Name</label>
              <input type="text" id="fullName" value="Nguyen Van A" />
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" value="nguyenvana@email.com" />
            </div>

            <div class="form-group">
              <label for="phone">Phone</label>
              <input type="text" id="phone" value="0901234567" />
            </div>

            <div class="form-group">
              <label for="studentId">Student ID</label>
              <input type="text" id="studentId" value="2212345" />
            </div>

            <div class="form-group">
              <label for="department">Department</label>
              <input type="text" id="department" value="Computer Science" />
            </div>

            <button type="submit" class="update-btn">Update Profile</button>
          </form>
        </section>
      </div>
    </main>
  </div>
</body>
